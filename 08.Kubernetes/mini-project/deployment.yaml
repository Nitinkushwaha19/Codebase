kind: Deployment
apiVersion: apps/v1
metadata:
  name: myapp-deployment
  labels:
    name: myapp
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: nitinkushwaha706/fe:latest
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet: 
            path: /
            port: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80